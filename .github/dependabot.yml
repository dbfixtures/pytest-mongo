version: 2
updates:
- package-ecosystem: uv
  directories:
    - "/"
  exclude-paths:
    - "oldest/*"
  schedule:
    interval: daily
    time: "04:15"
  open-pull-requests-limit: 1
  cooldown:
    default-days: 7
- package-ecosystem: github-actions
  directories:
    - "/"
  schedule:
    interval: weekly
    time: "04:20"
  open-pull-requests-limit: 2
  cooldown:
    default-days: 7
